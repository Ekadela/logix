        // Input Handlers
        function toggleCheckbox(val) {
            let idx = selectedAnswers.indexOf(val);
            if(idx > -1) selectedAnswers.splice(idx, 1);
            else selectedAnswers.push(val);
        }

        // Fungsi kembali (Langsung lompat ke Screen 11 / Investigation Board)
        function handleBack() {
            if (currentScreen >= 12) {
                currentScreen = 11;
                // Kembalikan fungsionalitas tombol utama ke validasi normal
                document.getElementById('btnAction').setAttribute('onclick', 'handleAction()');
                renderScreen();
            }
        }

        function setRadioValue(val) {
            singleAnswer = val;
        }

        // Core Game Validation logic
        function handleAction() {
            const fb = document.getElementById('feedbackBox');

            // --- VALIDASI SCREEN 2 ---
            if(currentScreen === 2) {
                if(selectedAnswers.length === 0) { alert("Pilih jawaban sebelum memverifikasi!"); return; }
                if(selectedAnswers.length === 5) {
                    showFeedback(true, "Semua pernyataan di atas dapat dinilai benar atau salah sehingga termasuk proposisi.");
                } else {
                    showFeedback(false, "Kurang tepat. Ingat, proposisi adalah kalimat deklaratif yang dapat ditentukan nilai kebenarannya (benar/salah), tidak peduli alibi itu jujur atau bohong.");
                    return;
                }
            }
            // --- VALIDASI SCREEN 3 ---
            else if(currentScreen === 3) {
                if(selectedAnswers.length === 0) { alert("Pilih jawaban sebelum memverifikasi!"); return; }
                let isCorrect = selectedAnswers.includes('1') && selectedAnswers.includes('3') && selectedAnswers.includes('5') && selectedAnswers.length === 3;
                if(isCorrect) {
                    showFeedback(true, "Hanya pernyataan (1, 3, 5) yang memiliki nilai benar atau salah yang dapat digunakan sebagai fakta investigasi.");
                } else {
                    showFeedback(false, "Salah. Nomor 2 (Kalimat tanya) dan Nomor 4 (Kalimat perintah) tidak memiliki nilai kebenaran objektif, sehingga bukan proposisi fakta.");
                    return;
                }
            }
            // --- VALIDASI SCREEN 4 ---
            else if(currentScreen === 4) {
                if(!singleAnswer) { alert("Pilih opsi jawaban!"); return; }
                if(singleAnswer === 'Tidak') {
                    showFeedback(true, "Satu bukti belum cukup untuk menentukan pelaku. Investigasi membutuhkan beberapa fakta yang saling mendukung.");
                } else {
                    showFeedback(false, "Pikirkan lagi. Rekaman kabur tanpa identitas jelas tentu tidak cukup untuk menuduh seseorang.");
                    return;
                }
            }
            // --- VALIDASI SCREEN 5 ---
            else if(currentScreen === 5) {
                if(!singleAnswer) { alert("Pilih opsi jawaban!"); return; }
                if(singleAnswer === 'Didukung') {
                    showFeedback(true, "Bukti CCTV mendukung pernyataan Zea.");
                } else {
                    showFeedback(false, "Salah, CCTV jelas merekam Zea sedang bertransaksi di kantin.");
                    return;
                }
            }
            // --- VALIDASI SCREEN 6 ---
            else if(currentScreen === 6) {
                if(!singleAnswer) { alert("Pilih opsi jawaban!"); return; }
                if(singleAnswer === 'Didukung') {
                    showFeedback(true, "Pernyataan Anne sesuai dengan bukti yang ditemukan.");
                } else {
                    showFeedback(false, "Kurang tepat, rekaman menunjukkan ia masuk ke perpustakaan sesuai alibinya.");
                    return;
                }
            }
            // --- VALIDASI SCREEN 7 ---
            else if(currentScreen === 7) {
                if(selectedAnswers.length === 0) { alert("Pilih opsi komponen!"); return; }
                let isCorrect = selectedAnswers.includes('lab') && !selectedAnswers.includes('tugas');
                if(isCorrect) {
                    showFeedback(true, "Kata 'dan' merupakan konjungsi. Agar seluruh pernyataan benar, kedua bagian harus terbukti benar. Saat ini hanya bagian pertama yang memiliki bukti.");
                } else {
                    showFeedback(false, "Perhatikan! Tidak ada bukti kamera atau saksi yang mengonfirmasi keberadaan anggota kelompok lain.");
                    return;
                }
            }
            // --- VALIDASI SCREEN 8 ---
            else if(currentScreen === 8) {
                if(!singleAnswer) { alert("Pilih opsi jawaban!"); return; }
                if(singleAnswer === 'Ya') {
                    showFeedback(true, "Kata 'atau' merupakan disjunsi. Jika salah satu bagian benar, maka keseluruhan pernyataan masih dapat dianggap benar.");
                } else {
                    showFeedback(false, "Keliru. Pada hukum disjunsi (p ∨ q), kalimat bernilai benar selama minimal ada satu bagiannya yang benar.");
                    return;
                }

            // --- VALIDASI SCREEN 9 ---

                    showFeedback(true, "Belum cukup untuk menyimpulkan siapa pelaku, tetapi kesaksian/pernyataan Celyn mulai kehilangan dukungan bukti.");

                    showFeedback(false, "Saksi mata membersihkan jalanan taman, cari siswa yang mengaku berada di taman.");
                    return;

                    showFeedback(true, "Saat ini Celyn menjadi orang yang paling sesuai dengan bukti atribut jaket yang ditemukan.");

                    showFeedback(false, "Periksa kembali data biografi di silabus, siapa yang tergabung di klub matematika?");
                    return;

            else if(currentScreen === 12) {
                if(!singleAnswer) { alert("Tentukan keputusan dakwaan final kamu!"); return; }
                if(singleAnswer === 'Celyn') {
                    renderRevealScreen(true);
                    return;
                } else {
                    renderRevealScreen(false);
                    return;
                }
            }

            // Pindah Screen jika lolos validasi kuis
            currentScreen++;
            if(currentScreen <= 12) {
                if(fb.classList.contains('hidden')) {
                    renderScreen();
                } else {
                    document.getElementById('btnAction').innerText = "Lanjutkan &rarr;";
                    document.getElementById('btnAction').setAttribute('onclick', 'forceNext()');
                }
            }
        }

        function forceNext() {
            document.getElementById('btnAction').setAttribute('onclick', 'handleAction()');
            renderScreen();
        }

        function showFeedback(isSuccess, text) {
            const fb = document.getElementById('feedbackBox');
            fb.classList.remove('hidden', 'bg-emerald-500/10', 'border-emerald-500/20', 'text-emerald-400', 'bg-red-500/10', 'border-red-500/20', 'text-red-400');
            
            if(isSuccess) {
                fb.classList.add('bg-emerald-500/10', 'border', 'border-emerald-500/20', 'text-emerald-400');
                fb.innerHTML = `<strong>✅ BERHASIL:</strong> ${text}`;

                fb.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
                fb.innerHTML = `<strong>❌ ANALISIS KURANG TEPAT:</strong> ${text}`;
            }
        }

        // Render Akhir Khusus Reveal (Screen 13)
        function renderRevealScreen(isVictory) {

                        </div>
                    </div>
                `;
            } else {
                btnBack.style.opacity = '1';
                btnBack.disabled = false;

                btn.innerText = "Ulangi Analisis Papan Kasus";
                btn.setAttribute('onclick', 'window.location.reload()');
                btn.className = "bg-amber-600 hover:bg-amber-700 text-white font-bold px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all cursor-pointer";

                content.innerHTML = `
                    <div class="text-center space-y-4">

                `;
            }
