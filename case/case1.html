<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix - Investigasi Kasus 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen flex flex-col selection:bg-amber-500/30 selection:text-amber-200">

    <header class="border-b border-slate-800 bg-[#030712]/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-xs bg-amber-500/10 border border-amber-500/20 text-amber-500 px-2.5 py-1 rounded-md font-mono uppercase tracking-wider">Modul 1</span>
            <h1 class="text-sm font-semibold tracking-tight heading-font">Kasus 1: Alibi Digital di Ruang Siber</h1>
        </div>
        <a href="../investigasi-menu.html" class="text-xs font-medium text-slate-400 hover:text-white transition-colors bg-slate-900 border border-slate-800 px-3 py-2 rounded-lg flex items-center gap-1.5">
            &larr; Kembali ke Menu Investigasi
        </a>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-6 md:p-8 flex flex-col justify-between">
        
        <div class="bg-slate-950/40 border border-slate-900 rounded-2xl p-6 md:p-8 backdrop-blur-sm min-h-[450px] flex flex-col justify-between shadow-2xl shadow-black/50">
            <div id="screenContent" class="space-y-6">
                </div>

            <div class="mt-8 pt-6 border-t border-slate-900 space-y-4">
                <div id="feedbackBox" class="hidden p-4 rounded-xl text-sm border transition-all duration-300 font-medium"></div>

                <div class="flex justify-between items-center w-full">
                    <button id="btnBack" onclick="handleBack()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium px-4 py-2 rounded-xl text-xs uppercase tracking-wider transition-all disabled:opacity-0 disabled:pointer-events-none cursor-pointer invisible">
                        &larr; Kembali
                    </button>
                    
                    <span id="screenIndicator" class="text-xs font-mono text-slate-500">SCREEN 1 / 13</span>
                    
                    <button id="btnAction" onclick="handleAction()" class="bg-amber-600 hover:bg-amber-700 text-white font-bold px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all shadow-[0_4px_20px_rgba(217,119,6,0.15)] cursor-pointer">
                        Mulai Investigasi
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Session Handling
        const currentUser = sessionStorage.getItem('logix_username') || 'guest';
        let currentScreen = 1;

        // Penyimpanan jawaban per screen agar tidak hilang saat tombol 'Kembali' ditekan
        let answersState = {
            2: [], 3: [], 4: null, 5: null, 6: null, 7: [], 8: null, 9: null, 10: null, 12: null
        };

        // Penyimpanan status feedback per screen (null = belum dijawab)
        let feedbackState = {
            2: null, 3: null, 4: null, 5: null, 6: null, 7: null, 8: null, 9: null, 10: null, 12: null
        };

        function renderScreen() {
            const content = document.getElementById('screenContent');
            const indicator = document.getElementById('screenIndicator');
            const btn = document.getElementById('btnAction');
            
            indicator.innerText = `SCREEN ${currentScreen} / 13`;

            // Atur visibilitas tombol kembali
            if (currentScreen === 1 || currentScreen === 11 || currentScreen === 13) {
                document.getElementById('btnBack').classList.add('invisible');
            } else {
                document.getElementById('btnBack').classList.remove('invisible');
            }

            // Pulihkan feedbackState dan tipe tombol jika halaman ini sudah pernah dijawab
            const feedbackBox = document.getElementById('feedbackBox');
            const savedFeedback = feedbackState[currentScreen];
            if (savedFeedback) {
                feedbackBox.classList.remove('hidden', 'bg-emerald-500/10', 'border-emerald-500/20', 'text-emerald-400', 'bg-red-500/10', 'border-red-500/20', 'text-red-400');
                if (savedFeedback.isSuccess) {
                    feedbackBox.classList.add('bg-emerald-500/10', 'border', 'border-emerald-500/20', 'text-emerald-400');
                    feedbackBox.innerHTML = `<strong>✅ BERHASIL:</strong> ${savedFeedback.text}`;
                    btn.innerText = "Lanjutkan &rarr;";
                    btn.setAttribute('onclick', 'forceNext()');
                } else {
                    feedbackBox.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
                    feedbackBox.innerHTML = `<strong>❌ ANALISIS KURANG TEPAT:</strong> ${savedFeedback.text}`;
                    btn.innerText = "Verifikasi Analisis";
                    btn.setAttribute('onclick', 'handleAction()');
                }
            } else {
                feedbackBox.classList.add('hidden');
                btn.innerText = (currentScreen === 1) ? "Mulai Investigasi" : "Verifikasi Analisis";
                btn.setAttribute('onclick', 'handleAction()');
            }

            // Render Core UI Per Screen
            switch(currentScreen) {
                case 1:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h2 class="text-xl font-bold heading-font text-amber-500">🏢 Kasus: Kebocoran Data Log Elektronik Server Pusat</h2>
                            <p class="text-sm text-slate-400 leading-relaxed text-justify">
                                Detektif Logix, sebuah insiden siber serius melanda server basis data utama. Data log akses elektronik selama periode kritis telah dimanipulasi. Tim IT forensik berhasil mengisolasi server dan mengunci daftar orang yang berada di dalam gedung atau terhubung ke jaringan lokal pada rentang waktu kejadian.
                            </p>
                            <p class="text-sm text-slate-400 leading-relaxed text-justify">
                                Berdasarkan data awal, terdapat lima orang terduga yang berada di sekitar area fasilitas siber: <strong class="text-slate-200">Anne, Zea, Adel, James, dan Celyn</strong>. Tugas Anda adalah melakukan analisis logika ketat berdasarkan premis-premis digital yang valid untuk mengeliminasi alibi palsu dan mengunci pelaku utamanya.
                            </p>
                        </div>
                    `;
                    break;

                case 2:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🕵️ Kasus 1 - Langkah 1: Mendaftar Semua Terduga</h3>
                            <p class="text-sm text-slate-400">Pilihlah <strong>semua nama</strong> terduga yang terdaftar dalam berkas kasus ini untuk menyusun himpunan semesta pembicaraan ($S$):</p>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 pt-2">
                                ${['Anne','Zea','Adel','James','Celyn'].map(name => {
                                    const checked = answersState[2].includes(name) ? 'checked' : '';
                                    return `
                                        <label class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-3 py-2 rounded-lg cursor-pointer hover:bg-slate-800/50">
                                            <input type="checkbox" value="${name}" onchange="toggleCheckbox('${name}')" ${checked} class="accent-amber-500"> ${name}
                                        </label>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    break;

                case 3:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">📌 Kasus 1 - Langkah 2: Memahami Pernyataan Petunjuk</h3>
                            <div class="bg-amber-500/5 border border-amber-500/10 p-4 rounded-xl space-y-2 text-xs text-slate-400">
                                <p><strong>Berkas Log Kasus mencantumkan 5 Pernyataan Kunci berikut:</strong></p>
                                <ol class="list-decimal list-inside space-y-1 font-mono text-amber-500/90">
                                    <li>Pernyataan 1: Adel berada di ruang server atau James berada di ruang server.</li>
                                    <li>Pernyataan 2: Jika James berada di ruang server, maka Celyn tidak berada di ruang server.</li>
                                    <li>Pernyataan 3: Celyn berada di ruang server atau Zea tidak berada di ruang server.</li>
                                    <li>Pernyataan 4: Jika Anne berada di ruang server, maka Zea berada di ruang server.</li>
                                    <li>Pernyataan 5: Diketahui pasti bahwa Anne berada di ruang server berdasarkan log kartu akses pintu depan.</li>
                                </ol>
                            </div>
                            <p class="text-sm text-slate-400">Pilih nomor pernyataan yang memuat **fakta tunggal atau kepastian posisi** tanpa bersyarat sebagai titik awal analisis deduksi kita:</p>
                            <div class="flex flex-wrap gap-3 pt-2">
                                ${[1, 2, 3, 4, 5].map(num => {
                                    const checked = answersState[3].includes(String(num)) ? 'checked' : '';
                                    return `
                                        <label class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg cursor-pointer hover:bg-slate-800/50">
                                            <input type="checkbox" value="${num}" onchange="toggleCheckbox('${num}')" ${checked} class="accent-amber-500"> Nomor ${num}
                                        </label>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    break;

                case 4:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🔍 Kasus 1 - Langkah 3: Deduksi Status Anne</h3>
                            <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl font-mono text-xs text-slate-400">
                                <strong>Premis Acuan:</strong><br>
                                Pernyataan 5: "Diketahui pasti bahwa Anne berada di ruang server."
                            </div>
                            <p class="text-sm text-slate-400">Berdasarkan fakta konkrit di atas, apakah pernyataan tunggal <strong class="text-amber-500 font-mono">p: "Anne berada di ruang server"</strong> bernilai Benar (True)?</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen4" value="Ya" onclick="setRadioValue('Ya')" ${answersState[4] === 'Ya' ? 'checked' : ''} class="accent-amber-500"> Ya, Bernilai BENAR
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen4" value="Tidak" onclick="setRadioValue('Tidak')" ${answersState[4] === 'Tidak' ? 'checked' : ''} class="accent-amber-500"> Tidak, Bernilai SALAH
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 5:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🔍 Kasus 1 - Langkah 4: Modus Ponens Status Zea</h3>
                            <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl font-mono text-xs text-slate-400 space-y-1">
                                <strong>Premis Terverifikasi:</strong> Anne = BENAR<br>
                                <strong>Aturan Logika (Pernyataan 4):</strong> "Jika Anne berada di ruang server ($p$), maka Zea berada di ruang server ($q$)." ($p \rightarrow q$)
                            </div>
                            <p class="text-sm text-slate-400">Menggunakan penarikan kesimpulan **Modus Ponens**, apa status keberadaan Zea di ruang server?</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen5" value="Zea_Benar" onclick="setRadioValue('Zea_Benar')" ${answersState[5] === 'Zea_Benar' ? 'checked' : ''} class="accent-amber-500"> Zea berada di ruang server (BENAR)
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen5" value="Zea_Salah" onclick="setRadioValue('Zea_Salah')" ${answersState[5] === 'Zea_Salah' ? 'checked' : ''} class="accent-amber-500"> Zea tidak berada di ruang server (SALAH)
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 6:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🔍 Kasus 1 - Langkah 5: Silogisme Disjungtif Status Celyn</h3>
                            <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl font-mono text-xs text-slate-400 space-y-1">
                                <strong>Premis Terverifikasi:</strong> Zea = BENAR (Berarti negasinya, $\neg q$ "Zea tidak berada di ruang server" bernilai SALAH)<br>
                                <strong>Aturan Logika (Pernyataan 3):</strong> "Celyn berada di ruang server ($r$) atau Zea tidak berada di ruang server ($\neg q$)." ($r \lor \neg q$)
                            </div>
                            <p class="text-sm text-slate-400">Karena komponen $\neg q$ bernilai SALAH, agar kalimat disjungsi ($r \lor \neg q$) bernilai BENAR, maka pernyataan $r$ harus bernilai:</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen6" value="Benar" onclick="setRadioValue('Benar')" ${answersState[6] === 'Benar' ? 'checked' : ''} class="accent-amber-500"> BENAR, Celyn berada di ruang server
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen6" value="Salah" onclick="setRadioValue('Salah')" ${answersState[6] === 'Salah' ? 'checked' : ''} class="accent-amber-500"> SALAH, Celyn tidak berada di ruang server
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 7:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">📊 Kasus 1 - Langkah 6: Tabel Kebenaran Implikasi</h3>
                            <p class="text-sm text-slate-400">Mari uji aturan Pernyataan 2: "Jika James berada di ruang server ($s$), maka Celyn tidak berada di ruang server ($\neg text{Celyn}$)." Pilihlah kondisi baris pada tabel implikasi ($A \rightarrow B$) yang akan bernilai <strong>SALAH (False)</strong>:</p>
                            <div class="grid grid-cols-1 gap-2 pt-1 font-mono text-xs">
                                ${[
                                    { id: '1', txt: 'Kondisi 1: Antaseden (A) BENAR & Konsekuen (B) BENAR' },
                                    { id: '2', txt: 'Kondisi 2: Antaseden (A) BENAR & Konsekuen (B) SALAH' },
                                    { id: '3', txt: 'Kondisi 3: Antaseden (A) SALAH & Konsekuen (B) BENAR' },
                                    { id: '4', txt: 'Kondisi 4: Antaseden (A) SALAH & Konsekuen (B) SALAH' }
                                ].map(item => {
                                    const checked = answersState[7].includes(item.id) ? 'checked' : '';
                                    return `
                                        <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                            <input type="checkbox" value="${item.id}" onchange="toggleCheckbox('${item.id}')" ${checked} class="accent-amber-500"> ${item.txt}
                                        </label>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    break;

                case 8:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🔍 Kasus 1 - Langkah 7: Modus Tollens Status James</h3>
                            <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl font-mono text-xs text-slate-400 space-y-1">
                                <strong>Premis Terverifikasi:</strong> Celyn = BENAR (Maka kalimat "Celyn tidak berada di ruang server" bernilai SALAH)<br>
                                <strong>Aturan Logika (Pernyataan 2):</strong> "Jika James berada di ruang server, maka Celyn tidak berada di ruang server."
                            </div>
                            <p class="text-sm text-slate-400">Melalui penarikan kesimpulan **Modus Tollens**, karena akibatnya terbukti SALAH, maka status posisi James adalah:</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen8" value="James_Benar" onclick="setRadioValue('James_Benar')" ${answersState[8] === 'James_Benar' ? 'checked' : ''} class="accent-amber-500"> James berada di ruang server (BENAR)
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen8" value="James_Salah" onclick="setRadioValue('James_Salah')" ${answersState[8] === 'James_Salah' ? 'checked' : ''} class="accent-amber-500"> James tidak berada di ruang server (SALAH)
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 9:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🔍 Kasus 1 - Langkah 8: Analisis Disjungsi Final Status Adel</h3>
                            <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl font-mono text-xs text-slate-400 space-y-1">
                                <strong>Premis Terverifikasi:</strong> James = SALAH (Tidak di ruang server)<br>
                                <strong>Aturan Logika (Pernyataan 1):</strong> "Adel berada di ruang server atau James berada di ruang server."
                            </div>
                            <p class="text-sm text-slate-400">Agar disjungsi aturan di atas tetap bernilai BENAR secara keseluruhan sistem, status keberadaan Adel dipastikan:</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen9" value="Adel_Benar" onclick="setRadioValue('Adel_Benar')" ${answersState[9] === 'Adel_Benar' ? 'checked' : ''} class="accent-amber-500"> Adel berada di ruang server (BENAR)
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen9" value="Adel_Salah" onclick="setRadioValue('Adel_Salah')" ${answersState[9] === 'Adel_Salah' ? 'checked' : ''} class="accent-amber-500"> Adel tidak berada di ruang server (SALAH)
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 10:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">🎯 Kasus 1 - Langkah 9: Mengunci Pelaku Utama</h3>
                            <p class="text-sm text-slate-400">Dari hasil seluruh rangkaian inferensi logika deduktif kita, siapakah terduga yang **TIDAK berada di ruang server** dan alibinya terbukti valid?</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen10" value="Adel" onclick="setRadioValue('Adel')" ${answersState[10] === 'Adel' ? 'checked' : ''} class="accent-amber-500"> Adel
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen10" value="James" onclick="setRadioValue('James')" ${answersState[10] === 'James' ? 'checked' : ''} class="accent-amber-500"> James
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen10" value="Celyn" onclick="setRadioValue('Celyn')" ${answersState[10] === 'Celyn' ? 'checked' : ''} class="accent-amber-500"> Celyn
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 11:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h2 class="text-lg font-bold heading-font text-amber-500">⚡ Persidangan Logika: Pembuktian Formal</h2>
                            <p class="text-sm text-slate-400 leading-relaxed text-justify">
                                Detektif Logix, Anda diminta mempresentasikan berkas argumentasi Anda ke hadapan Dewan Siber. Kita akan menuliskan bukti formal menggunakan metode <strong class="text-slate-300">Deduksi Alami (Natural Deduction)</strong> untuk membuktikan secara mutlak keabsahan analisis kita.
                            </p>
                            <div class="bg-slate-900 p-4 rounded-xl font-mono text-xs text-slate-400 space-y-2">
                                <p class="text-amber-500 font-bold">// Kumpulan Premis Resmi Kasus 1:</p>
                                <p>1. $A \lor J$ (Adel atau James)</p>
                                <p>2. $J \rightarrow \neg C$ (Jika James maka tidak Celyn)</p>
                                <p>3. $C \lor \neg Z$ (Celyn atau tidak Zea)</p>
                                <p>4. $An \rightarrow Z$ (Jika Anne maka Zea)</p>
                                <p>5. $An$ (Anne berada di sana)</p>
                                <p class="text-amber-500 font-bold">Goal / Kesimpulan Akhir: $\neg J$ (James tidak berada di ruang server)</p>
                            </div>
                        </div>
                    `;
                    btn.innerText = "Lanjutkan ke Bukti Formal";
                    break;

                case 12:
                    content.innerHTML = `
                        <div class="space-y-4">
                            <h3 class="text-base font-semibold text-slate-300">📝 Kasus 1 - Langkah 10: Mengisi Langkah Bukti</h3>
                            <p class="text-sm text-slate-400">Langkah ke-6 dalam pembuktian formal kita berbunyi: <strong class="text-amber-500 font-mono">6. Z (Modus Ponens dari Premis 4 dan 5)</strong>. Selanjutnya, kita melakukan inferensi menggunakan Premis 3 ($C \lor \neg Z$) dan langkah 6 tersebut. Aturan inferensi manakah yang tepat digunakan untuk mendapatkan kesimpulan <strong class="text-slate-200 font-mono">"C"</strong>?</p>
                            <div class="space-y-2 pt-2">
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen12" value="DS" onclick="setRadioValue('DS')" ${answersState[12] === 'DS' ? 'checked' : ''} class="accent-amber-500"> Silogisme Disjungtif (Disjunctive Syllogism)
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen12" value="HS" onclick="setRadioValue('HS')" ${answersState[12] === 'HS' ? 'checked' : ''} class="accent-amber-500"> Silogisme Hipotesis (Hypothetical Syllogism)
                                </label>
                                <label class="flex items-center gap-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 cursor-pointer">
                                    <input type="radio" name="screen12" value="MP" onclick="setRadioValue('MP')" ${answersState[12] === 'MP' ? 'checked' : ''} class="accent-amber-500"> Modus Ponens
                                </label>
                            </div>
                        </div>
                    `;
                    break;

                case 13:
                    // Verifikasi Akhir
                    const isCaseComplete = (answersState[10] === 'James' && answersState[12] === 'DS');
                    renderRevealScreen(isCaseComplete);
                    break;
            }
        }

        // Input Handlers disesuaikan dengan State per screen
        function toggleCheckbox(val) {
            let activeAnswers = answersState[currentScreen];
            let idx = activeAnswers.indexOf(val);
            if(idx > -1) activeAnswers.splice(idx, 1);
            else activeAnswers.push(val);
        }

        function setRadioValue(val) {
            answersState[currentScreen] = val;
        }

        function showFeedback(isSuccess, text) {
            const fb = document.getElementById('feedbackBox');
            const btn = document.getElementById('btnAction');
            fb.classList.remove('hidden', 'bg-emerald-500/10', 'border-emerald-500/20', 'text-emerald-400', 'bg-red-500/10', 'border-red-500/20', 'text-red-400');
            
            // Catat data feedback ke state global berdasarkan screen aktif saat ini
            feedbackState[currentScreen] = { isSuccess: isSuccess, text: text };

            if(isSuccess) {
                fb.classList.add('bg-emerald-500/10', 'border', 'border-emerald-500/20', 'text-emerald-400');
                fb.innerHTML = `<strong>✅ BERHASIL:</strong> ${text}`;
                btn.innerText = "Lanjutkan &rarr;";
                btn.setAttribute('onclick', 'forceNext()');
            } else {
                fb.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
                fb.innerHTML = `<strong>❌ ANALISIS KURANG TEPAT:</strong> ${text}`;
            }
        }

        function forceNext() {
            currentScreen++;
            renderScreen();
        }

        function handleBack() {
            if (currentScreen > 1) {
                currentScreen--;
                document.getElementById('btnAction').setAttribute('onclick', 'handleAction()');
                renderScreen();
            }
        }

        function handleAction() {
            if(currentScreen === 1 || currentScreen === 11) {
                currentScreen++;
                renderScreen();
                return;
            }

            // Validasi Logika Tiap Screen Pembelajaran
            if(currentScreen === 2) {
                if(answersState[2].length === 0) { alert("Pilih jawaban sebelum memverifikasi!"); return; }
                if(answersState[2].length === 5) {
                    showFeedback(true, "Himpunan semesta pembicaraan $S = \\{\\text{Anne}, \\text{Zea}, \\text{Adel}, \\text{James}, \\text{Celyn}\\}$ berhasil disusun sempurna.");
                } else {
                    showFeedback(false, "Jumlah terduga belum lengkap. Periksa kembali dokumen deskripsi kasus.");
                }
            }
            else if(currentScreen === 3) {
                if(answersState[3].length === 0) { alert("Pilih jawaban sebelum memverifikasi!"); return; }
                if(answersState[3].length === 1 && answersState[3].includes('5')) {
                    showFeedback(true, "Benar! Pernyataan 5 adalah Premis Faktual Tunggal ($p \\equiv \\text{True}$). Ini jangkar analisis kita!");
                } else {
                    showFeedback(false, "Pernyataan yang Anda pilih masih mengandung kondisi majemuk/syarat implikasi. Cari yang berupa fakta pasti.");
                }
            }
            else if(currentScreen === 4) {
                if(!answersState[4]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[4] === 'Ya') {
                    showFeedback(true, "Tepat. Berdasarkan kebenaran mutlak log akses, nilai kebenaran variabel proposisi Anne adalah BENAR.");
                } else {
                    showFeedback(false, "Bukti digital otentik tidak bisa disangkal. Status kebenaran harus bernilai Benar.");
                }
            }
            else if(currentScreen === 5) {
                if(!answersState[5]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[5] === 'Zea_Benar') {
                    showFeedback(true, "Brilian! Berdasarkan Modus Ponens: dari $p \\rightarrow q$ dan $p$, disimpulkan secara valid bahwa $q$ (Zea berada di ruang server) bernilai BENAR.");
                } else {
                    showFeedback(false, "Ingat aturan Modus Ponens. Jika sebab terjadi, maka akibatnya mutlak ikut terjadi.");
                }
            }
            else if(currentScreen === 6) {
                if(!answersState[6]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[6] === 'Benar') {
                    showFeedback(true, "Luar biasa! Karena disjungsi menuntut minimal salah satu sisi benar, dan sisi kanan ($\\neg Z$) bernilai salah, maka sisi kiri (Celyn) wajib bernilai BENAR.");
                } else {
                    showFeedback(false, "Gunakan prinsip Silogisme Disjungtif. Jika salah satu pilihan salah, pilihan lainnya harus benar.");
                }
            }
            else if(currentScreen === 7) {
                if(answersState[7].length === 0) { alert("Pilih jawaban sebelum memverifikasi!"); return; }
                if(answersState[7].length === 1 && answersState[7].includes('2')) {
                    showFeedback(true, "Koreksi Sempurna! Implikasi $A \\rightarrow B$ hanya bernilai SALAH saat Antaseden BENAR namun Konsekuennya SALAH.");
                } else {
                    showFeedback(false, "Analisis tabel kebenaran implikasi kurang akurat. Ingat janji implikasi hanya gugur jika sebab dipenuhi tapi akibat ingkar.");
                }
            }
            else if(currentScreen === 8) {
                if(!answersState[8]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[8] === 'James_Salah') {
                    showFeedback(true, "Sempurna! Modus Tollens terbukti: $J \\rightarrow \\neg C$, dan karena $\\neg C$ salah (Celyn terbukti Benar), maka $J$ harus SALAH (James tidak di ruang server).");
                } else {
                    showFeedback(false, "Tinjau kembali struktur Modus Tollens. Penolakan terhadap akibat berujung pada penolakan terhadap sebab.");
                }
            }
            else if(currentScreen === 9) {
                if(!answersState[9]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[9] === 'Adel_Benar') {
                    showFeedback(true, "Analisis final mematikan! Karena James bernilai SALAH, maka melalui Silogisme Disjungtif pada $A \\lor J$, Adel dipastikan BENAR berada di ruang server.");
                } else {
                    showFeedback(false, "Konjungsi/disjungsi sistem runtuh jika Adel juga bernilai salah. Cek sifat operasi logika 'atau'.");
                }
            }
            else if(currentScreen === 10) {
                if(!answersState[10]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[10] === 'James') {
                    showFeedback(true, "Tepat Sekali! Alibi James diverifikasi 100% valid secara matematis karena dia tidak berada di dalam ruang server saat insiden terjadi.");
                } else {
                    showFeedback(false, "Nama tersebut memiliki nilai kebenaran BENAR (berada di TKP) berdasarkan runtutan logika kita.");
                }
            }
            else if(currentScreen === 12) {
                if(!answersState[12]) { alert("Pilih opsi jawaban!"); return; }
                if(answersState[12] === 'DS') {
                    showFeedback(true, "Tepat! Aturan dari $(\\phi \\lor \\psi)$ dan $\\neg \\psi$ menghasilkan $\\phi$ disebut aturan Silogisme Disjungtif (Disjunctive Syllogism).");
                } else {
                    showFeedback(false, "Kombinasi eliminasi tanda 'atau' ($\lor$) dipandu negasi bukan merupakan ciri khas aturan tersebut.");
                }
            }
        }

        function renderRevealScreen(isVictory) {
            const content = document.getElementById('screenContent');
            const btn = document.getElementById('btnAction');
            
            if(isVictory) {
                content.innerHTML = `
                    <div class="text-center space-y-6 py-8 animate-fade-in">
                        <div class="inline-flex p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full text-4xl mb-2">🏆</div>
                        <h2 class="text-2xl font-bold heading-font text-emerald-400">KASUS BERHASIL DIPECAHKAN!</h2>
                        <p class="text-sm text-slate-400 max-w-lg mx-auto leading-relaxed">
                            Kerja bagus, Detektif <span class="text-slate-200 font-semibold">${currentUser}</span>! Deduksi matematis Anda berhasil membersihkan nama <strong class="text-amber-500">James</strong> dari tuduhan siber dan mengamankan bukti konkrit untuk rekonstruksi kasus selanjutnya.
                        </p>
                    </div>
                `;
                btn.innerText = "Selesaikan Kasus & Kembali";
                btn.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all shadow-[0_4px_20px_rgba(16,185,129,0.15)] cursor-pointer";
                btn.setAttribute('onclick', 'backToHub()');
            } else {
                content.innerHTML = `
                    <div class="text-center space-y-6 py-8">
                        <div class="inline-flex p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-full text-4xl mb-2">❌</div>
                        <h2 class="text-2xl font-bold heading-font text-red-400">ANALISIS GAGAL TOTAL</h2>
                        <p class="text-sm text-slate-400 max-w-lg mx-auto leading-relaxed">
                            Terdapat mata rantai logika formal atau deduksi tersangka yang tidak sinkron. Mahkamah Siber menolak kesimpulan Anda karena dianggap cacat logika.
                        </p>
                    </div>
                `;
                btn.innerText = "Ulangi Analisis Kasus";
                btn.className = "bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all cursor-pointer";
                btn.setAttribute('onclick', 'resetCase()');
            }
        }

        function resetCase() {
            currentScreen = 1;
            answersState = { 2: [], 3: [], 4: null, 5: null, 6: null, 7: [], 8: null, 9: null, 10: null, 12: null };
            feedbackState = { 2: null, 3: null, 4: null, 5: null, 6: null, 7: null, 8: null, 9: null, 10: null, 12: null };
            
            const btn = document.getElementById('btnAction');
            btn.className = "bg-amber-600 hover:bg-amber-700 text-white font-bold px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all shadow-[0_4px_20px_rgba(217,119,6,0.15)] cursor-pointer";
            renderScreen();
        }

        function backToHub() {
            window.location.href = "../investigasi-menu.html";
        }

        // Jalankan inisialisasi awal saat halaman termuat dengan aman
        window.onload = function() {
            renderScreen();
        };
    </script>
</body>
</html>
