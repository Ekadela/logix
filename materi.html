<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIX — Academy Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <nav class="border-b border-slate-800/80 bg-slate-900/40 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto max-w-5xl px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-slate-400 hover:text-white transition-colors text-sm font-semibold flex items-center gap-1">
                    &larr; Kembali ke Dashboard
                </a>
                <span class="text-slate-700">|</span>
                <span class="text-lg font-black tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">LOGIX ACADEMY</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto max-w-5xl px-6 py-10 flex-grow">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-white">Daftar Modul Pembelajaran</h1>
            <p class="text-slate-400 text-sm mt-1">Selesaikan kuis di setiap modul untuk mempersiapkan diri sebelum masuk ke Mode Investigasi.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            
            <a href="modul1.html" class="group bg-slate-900 border border-slate-800 hover:border-amber-500/50 p-5 rounded-2xl transition-all duration-300 hover:shadow-[0_0_20px_rgba(245,158,11,0.05)] flex items-start gap-4">
                <span class="text-2xl bg-amber-500/10 p-2.5 rounded-xl group-hover:scale-110 transition-transform">📖</span>
                <div>
                    <span class="text-xs font-bold text-amber-400 font-mono">MODUL 01</span>
                    <h3 class="text-base font-bold text-slate-200 group-hover:text-amber-400 transition-colors mt-0.5">Proposisi</h3>
                    <p class="text-xs text-slate-400 mt-1.5 leading-relaxed">Mengenali informasi yang dapat dijadikan fakta atau bukti nyata.</p>
                </div>
            </a>

            <script>
                const moduls = [
                    "Negasi", "Konjungsi", "Disjunsi", "Implikasi", "Biimplikasi",
                    "Tabel Kebenaran", "Tautologi", "Kontradiksi", "Aturan Inferensi",
                    "Modus Ponens", "Modus Tollens", "Silogisme", "Penarikan Kesimpulan"
                ];
                moduls.forEach((name, i) => {
                    const no = String(i + 2).padStart(2, '0');
                    document.write(`
                        <div class="bg-slate-950 border border-slate-900/60 p-5 rounded-2xl opacity-40 cursor-not-allowed flex items-start gap-4">
                            <span class="text-2xl bg-slate-900 p-2.5 rounded-xl">🔒</span>
                            <div>
                                <span class="text-xs font-bold text-slate-500 font-mono">MODUL ${no}</span>
                                <h3 class="text-base font-medium text-slate-400 mt-0.5">${name}</h3>
                                <p class="text-xs text-slate-500 mt-1.5">Materi ini masih terkunci.</p>
                            </div>
                        </div>
                    `);
                });
            </script>

        </div>
    </main>

    <footer class="border-t border-slate-900 bg-slate-950 py-4 text-center text-xs text-slate-500 font-mono">
        <p>&copy; 2026 Tim LOGIX — Universitas Negeri Surabaya.</p>
    </footer>

</body>
</html>
